name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  spaceflights:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pondrs-spaceflights
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pondrs-spaceflights
      - name: Build
        run: cargo build
      - name: Run
        run: cargo run -- run
